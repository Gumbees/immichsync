name: PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Review for security vulnerabilities, logic bugs, and correctness.
            Flag OWASP top 10 issues, unsafe input handling, and injection risks.
            Only comment on real problems, not style preferences.
