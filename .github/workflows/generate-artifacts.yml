name: Generate Repo Artifacts

on:
  push:
    branches:
      - development
      - release
    paths-ignore:
      - 'SBOM.md'
      - 'STRUCTURE.md'
  schedule:
    # Weekly refresh catches upstream license/version metadata changes
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install tree
        run: sudo apt-get install -y tree jq

      - name: Generate STRUCTURE.md
        run: |
          {
            echo "# Repository Structure"
            echo ""
            echo "_Auto-generated on $(date -u '+%Y-%m-%d %H:%M UTC') from commit \`${GITHUB_SHA::7}\`._"
            echo ""
            echo '```'
            tree -I 'node_modules|target|dist|.git|.venv|__pycache__|.next|.nuxt|build|coverage' -L 4 --dirsfirst
            echo '```'
          } > STRUCTURE.md

      # Async SBOM endpoint — required for repos with 500+ transitive deps
      # (immichsync has ~630 via Cargo.lock, which times out the sync endpoint).
      - name: Fetch SBOM (async)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UUID=$(curl -sL --fail \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/dependency-graph/sbom/generate-report" \
            | jq -r '.sbom_uuid')

          if [ -z "$UUID" ] || [ "$UUID" = "null" ]; then
            echo "Failed to start async SBOM generation"
            exit 1
          fi

          for i in $(seq 1 60); do
            STATUS=$(curl -sL -o sbom.json -w "%{http_code}" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -L \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/dependency-graph/sbom/fetch-report/${UUID}")
            if [ "$STATUS" = "200" ]; then
              echo "SBOM ready after ${i} polls"
              break
            fi
            if [ "$i" = "60" ]; then
              echo "SBOM generation timed out after 5 minutes"
              exit 1
            fi
            sleep 5
          done

      - name: Render SBOM.md
        run: |
          {
            echo "# Software Bill of Materials"
            echo ""
            echo "_Auto-generated on $(date -u '+%Y-%m-%d %H:%M UTC') from commit \`${GITHUB_SHA::7}\`. SPDX source: \`sbom.json\` (not committed)._"
            echo ""
            echo "| Package | Version | License | Supplier |"
            echo "|---------|---------|---------|----------|"
            jq -r '
              .sbom.packages
              | sort_by(.name)
              | .[]
              | [
                  (.name // "-"),
                  (.versionInfo // "-"),
                  (.licenseConcluded // .licenseDeclared // "-"),
                  (.supplier // "-")
                ]
              | @tsv
            ' sbom.json \
            | awk -F'\t' '{printf "| %s | %s | %s | %s |\n", $1, $2, $3, $4}'
            echo ""
            echo "## Summary"
            echo ""
            echo "- Total packages: $(jq '.sbom.packages | length' sbom.json)"
            echo "- SPDX version: $(jq -r '.sbom.spdxVersion' sbom.json)"
            echo "- Generated by: $(jq -r '.sbom.creationInfo.creators | join(", ")' sbom.json)"
          } > SBOM.md
          rm sbom.json

      - name: Commit artifacts if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate SBOM and STRUCTURE [skip ci]"
          file_pattern: "SBOM.md STRUCTURE.md"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
