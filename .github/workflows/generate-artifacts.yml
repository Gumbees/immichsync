name: Generate Repo Artifacts

on:
  push:
    branches:
      - development
      - release
    paths-ignore:
      - 'SBOM.md'
      - 'STRUCTURE.md'
  schedule:
    # Weekly refresh catches upstream license/version metadata changes
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: sudo apt-get install -y tree jq

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate STRUCTURE.md
        run: |
          {
            echo "# Repository Structure"
            echo ""
            echo "_Auto-generated on $(date -u '+%Y-%m-%d %H:%M UTC') from commit \`${GITHUB_SHA::7}\`._"
            echo ""
            echo '```'
            tree -I 'node_modules|target|dist|.git|.venv|__pycache__|.next|.nuxt|build|coverage' -L 4 --dirsfirst
            echo '```'
          } > STRUCTURE.md

      # SBOM source: `cargo metadata --locked` — exact match to Cargo.lock,
      # no external API dependency, no dep-graph indexing wait.
      - name: Generate SBOM.md
        run: |
          cargo metadata --format-version 1 --locked > metadata.json
          {
            echo "# Software Bill of Materials"
            echo ""
            echo "_Auto-generated on $(date -u '+%Y-%m-%d %H:%M UTC') from commit \`${GITHUB_SHA::7}\` via \`cargo metadata --locked\`._"
            echo ""
            echo "| Package | Version | License | Repository |"
            echo "|---------|---------|---------|------------|"
            jq -r '
              .packages
              | map(select(.source != null))
              | sort_by(.name)
              | .[]
              | [
                  (.name // "-"),
                  (.version // "-"),
                  (.license // "-"),
                  (.repository // "-")
                ]
              | @tsv
            ' metadata.json \
            | awk -F'\t' '{printf "| %s | %s | %s | %s |\n", $1, $2, $3, $4}'
            echo ""
            echo "## Summary"
            echo ""
            echo "- Total third-party packages: $(jq '[.packages[] | select(.source != null)] | length' metadata.json)"
            echo "- Workspace members: $(jq '[.packages[] | select(.source == null)] | length' metadata.json)"
            echo "- Generated by: cargo metadata"
          } > SBOM.md
          rm metadata.json

      - name: Commit artifacts if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate SBOM and STRUCTURE [skip ci]"
          file_pattern: "SBOM.md STRUCTURE.md"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
