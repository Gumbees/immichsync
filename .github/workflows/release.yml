name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and attach Windows binary
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
        env:
          CARGO_TARGET_DIR: target

      - name: Verify tag matches Cargo.toml version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $manifestVersion = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          if ($tag -ne $manifestVersion) {
            Write-Error "Tag $tag does not match Cargo.toml version $manifestVersion"
            exit 1
          }
          Write-Host "Tag and manifest agree on version $tag"

      - name: Build release binary
        run: cargo build --release --locked
        env:
          CARGO_TARGET_DIR: target

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ImmichSync ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: target/release/immichsync.exe
          fail_on_unmatched_files: true
