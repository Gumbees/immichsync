name: CI

# Build, test, and (on push) attach the binary as a workflow artifact.
#
# Push triggers cover development, release, and the four working-branch
# prefixes (feature/improvement/bug/refactor) per the Branching Strategy.
# PRs trigger the same build+test for gating but skip artifact upload to
# avoid duplicating with the push-triggered run.
#
# Artifact naming follows the working-branch pattern from the Docker Image
# Tagging Strategy, adapted for a Windows binary:
#   development           → immichsync-{version}-dev-{sha}.exe
#   feature/improvement/  → immichsync-{version}-{branch-slug}-{sha}.exe
#   bug/refactor
# release pushes don't upload — the tag-on-release.yml workflow cuts a
# vX.Y.Z tag, which fires release.yml to attach the binary to a real
# GitHub Release.

on:
  push:
    branches:
      - development
      - release
      - 'feature/**'
      - 'improvement/**'
      - 'bug/**'
      - 'refactor/**'
  pull_request:
    branches: [development, release]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  build-and-test:
    name: Build & test
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          # Repo's .cargo/config.toml hardcodes a target-dir for a specific
          # developer machine; override here with a CI-friendly path so the
          # cache key matches between runs.
          workspaces: ". -> target"
        env:
          CARGO_TARGET_DIR: target

      - name: Build (release)
        run: cargo build --release --locked
        env:
          CARGO_TARGET_DIR: target

      - name: Test
        run: cargo test --locked
        env:
          CARGO_TARGET_DIR: target

      - name: Clippy (informational)
        # Not gating yet — codebase has known dead-code warnings to clean up.
        # Track in repo issues; flip to `-D warnings` once clean.
        continue-on-error: true
        run: cargo clippy --all-targets -- -W clippy::all
        env:
          CARGO_TARGET_DIR: target

      - name: Format check (informational)
        # Not gating yet — see issue tracker for a planned `cargo fmt` sweep.
        continue-on-error: true
        run: cargo fmt --all -- --check

      # Compute the artifact name. Skipped on PRs (push event has already
      # produced an artifact for the same SHA) and on release pushes (the
      # tag-cutting + GitHub Release flow handles those).
      - name: Compute artifact name
        if: github.event_name == 'push' && github.ref != 'refs/heads/release'
        id: artifact_meta
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $ref = "${{ github.ref_name }}"
          if ($ref -eq "development") {
            $name = "immichsync-$version-dev-$shortSha"
          } else {
            # Working branch (feature/foo, improvement/bar, bug/baz, refactor/qux).
            # Flatten slashes so the artifact name is filesystem-safe.
            $slug = $ref -replace '/', '-'
            $name = "immichsync-$version-$slug-$shortSha"
          }
          "name=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload binary artifact
        if: github.event_name == 'push' && github.ref != 'refs/heads/release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_meta.outputs.name }}
          path: target/release/immichsync.exe
          retention-days: 90
          if-no-files-found: error
