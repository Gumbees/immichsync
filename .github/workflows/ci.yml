name: CI

# Build, test, and attach the binary as a workflow artifact.
#
# CI fires on pull_request only. Work branches don't trigger builds on
# direct push — engineers test locally before opening a PR. Once a PR is
# open, every commit pushed to it re-triggers CI via pull_request:synchronize.
# After the PR squash-merges, the development branch's new SHA represents
# the same source tree as the PR head; we don't rebuild it. The PR's last
# successful build is the canonical "current development" artifact.
#
# Direct pushes to development bypass CI entirely (and per branch policy,
# shouldn't happen — PRs only). Release publishes are handled by the
# separate release.yml workflow on push to release / v* tag.
#
# Artifact naming uses the PR's head ref (the work branch name) and the
# head commit SHA. Format:
#   immichsync-{version}-{branch-slug}-{sha}.exe

on:
  pull_request:
    branches: [development, release]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  build-and-test:
    name: Build & test
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          # Repo's .cargo/config.toml hardcodes a target-dir for a specific
          # developer machine; override here with a CI-friendly path so the
          # cache key matches between runs.
          workspaces: ". -> target"
        env:
          CARGO_TARGET_DIR: target

      - name: Build (release)
        run: cargo build --release --locked
        env:
          CARGO_TARGET_DIR: target

      - name: Test
        run: cargo test --locked
        env:
          CARGO_TARGET_DIR: target

      - name: Clippy (informational)
        # Not gating yet — codebase has known dead-code warnings to clean up.
        # Track in repo issues; flip to `-D warnings` once clean.
        continue-on-error: true
        run: cargo clippy --all-targets -- -W clippy::all
        env:
          CARGO_TARGET_DIR: target

      - name: Format check (informational)
        # Not gating yet — see issue tracker for a planned `cargo fmt` sweep.
        continue-on-error: true
        run: cargo fmt --all -- --check

      # Skip artifact upload on PRs targeting release (development → release).
      # Those PRs trigger the release.yml flow on merge, which builds and
      # attaches the binary to a real GitHub Release.
      - name: Compute artifact name
        if: github.event.pull_request.base.ref != 'release'
        id: artifact_meta
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          $shortSha = "${{ github.event.pull_request.head.sha }}".Substring(0, 7)
          $slug = "${{ github.head_ref }}" -replace '/', '-'
          $name = "immichsync-$version-$slug-$shortSha"
          "name=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload binary artifact
        if: github.event.pull_request.base.ref != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_meta.outputs.name }}
          path: target/release/immichsync.exe
          retention-days: 90
          if-no-files-found: error
